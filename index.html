<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>启炎物流 · 运费计算器</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(160deg,#1a3a6e 0%,#0d2240 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#fff;border-radius:28px;box-shadow:0 24px 80px rgba(0,0,0,.4);width:100%;max-width:480px;padding:48px 36px;text-align:center;position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,#ff8c00,#ff6600,#ffaa00)}
  .logo{display:inline-flex;width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,#2264dc,#4d86f5);color:#fff;font-size:30px;line-height:72px;margin-bottom:20px;box-shadow:0 8px 24px rgba(34,100,220,.35)}
  h1{font-size:26px;font-weight:800;color:#1a2a4a;margin-bottom:6px;letter-spacing:1px}
  .sub{font-size:14px;color:#7a90b4;margin-bottom:32px}
  .features{display:grid;grid-template-columns:1fr 1fr;gap:12px;text-align:left;margin-bottom:32px}
  .feat{background:#f5f8ff;border-radius:12px;padding:14px;font-size:13px;color:#3a5070;display:flex;align-items:flex-start;gap:8px}
  .feat-icon{font-size:18px;flex-shrink:0;margin-top:1px}
  .feat strong{display:block;font-size:13px;color:#1a2a4a;margin-bottom:2px}
  .cta{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,#ff8c00,#ff6600);color:#fff;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 8px 28px rgba(255,102,0,.4);transition:transform .12s,box-shadow .12s;text-decoration:none;display:block;text-align:center;margin-bottom:12px}
  .cta:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(255,102,0,.5)}
  .note{font-size:12px;color:#a0b8cc;margin-top:8px}
  .version{position:absolute;bottom:16px;right:20px;font-size:11px;color:#d0dcf0}
  .channels{display:flex;justify-content:center;gap:8px;margin-bottom:28px;flex-wrap:wrap}
  .ch{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;background:#f0f4ff;border-radius:20px;font-size:12px;color:#3a5070;font-weight:600}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🚚</div>
  <h1>启炎物流</h1>
  <p class="sub">东莞国际集运 · 运费实时估算</p>

  <div class="channels">
    <span class="ch">✈️ 空运</span>
    <span class="ch">🚢 海运</span>
    <span class="ch">🚛 卡航</span>
    <span class="ch">🚬 香烟/槟榔</span>
  </div>

  <div class="features">
    <div class="feat"><span class="feat-icon">🌍</span><div><strong>20+国家</strong>全球覆盖</div></div>
    <div class="feat"><span class="feat-icon">⚖️</span><div><strong>智能计费</strong>首重+续重</div></div>
    <div class="feat"><span class="feat-icon">📦</span><div><strong>批量优惠</strong>10kg+更划算</div></div>
    <div class="feat"><span class="feat-icon">⚙️</span><div><strong>实时更新</strong>价格后台可调</div></div>
  </div>

  <a class="cta" href="freight_calculator.html">🔍 打开运费计算器</a>
  <p class="note">以上为估算价，最终费用以实际出账为准</p>
  <div class="version">v2.0</div>
</div>
</body>
</html>
