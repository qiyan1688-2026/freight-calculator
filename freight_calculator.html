<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>集运运费估算器 · 启炎物流</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    background: linear-gradient(160deg, #dceeff 0%, #eaf4ff 60%, #f0f8ff 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(30, 90, 180, 0.12), 0 2px 8px rgba(0,0,0,0.06);
    width: 100%;
    max-width: 480px;
    padding: 36px 32px;
    overflow: hidden;
  }

  .brand {
    text-align: center;
    margin-bottom: 28px;
  }

  .brand-icon {
    display: inline-block;
    width: 52px;
    height: 52px;
    border-radius: 14px;
    background: linear-gradient(135deg, #2264dc, #4d86f5);
    color: #fff;
    font-size: 22px;
    line-height: 52px;
    margin-bottom: 10px;
    box-shadow: 0 4px 14px rgba(34, 100, 220, 0.28);
  }

  .brand h1 {
    font-size: 20px;
    font-weight: 700;
    color: #1a2a4a;
    letter-spacing: 0.5px;
  }

  .brand p {
    font-size: 13px;
    color: #7a90b4;
    margin-top: 4px;
  }

  .section-label {
    font-size: 12px;
    font-weight: 600;
    color: #7a90b4;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  /* --- Destination --- */
  .destination-tabs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 24px;
  }

  .dest-tab {
    padding: 10px 6px;
    border: 2px solid #dde7f7;
    border-radius: 12px;
    background: #f5f8ff;
    font-size: 14px;
    font-weight: 600;
    color: #4a5f8a;
    cursor: pointer;
    text-align: center;
    transition: all 0.18s;
  }

  .dest-tab.active {
    border-color: #2264dc;
    background: #e8f0ff;
    color: #2264dc;
    box-shadow: 0 0 0 3px rgba(34,100,220,0.12);
  }

  .dest-tab:hover:not(.active) {
    border-color: #a0b8e8;
    background: #eef3ff;
  }

  /* --- Input Grid --- */
  .input-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field.full {
    grid-column: 1 / -1;
  }

  .field label {
    font-size: 13px;
    font-weight: 600;
    color: #3a5070;
  }

  .field input {
    padding: 12px 14px;
    border: 2px solid #dde7f7;
    border-radius: 12px;
    font-size: 16px;
    color: #1a2a4a;
    background: #f8faff;
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
    width: 100%;
  }

  .field input:focus {
    border-color: #2264dc;
    box-shadow: 0 0 0 3px rgba(34,100,220,0.12);
    background: #fff;
  }

  .field input::placeholder {
    color: #a0b8cc;
  }

  .divider {
    height: 1px;
    background: linear-gradient(to right, transparent, #d0dcf0, transparent);
    margin: 20px 0;
  }

  /* --- Calculate Button --- */
  .calc-btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #ff8c00, #ff6600);
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255, 102, 0, 0.35);
    transition: transform 0.12s, box-shadow 0.12s;
    margin-top: 4px;
  }

  .calc-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(255, 102, 0, 0.45);
  }

  .calc-btn:active {
    transform: translateY(0);
    box-shadow: 0 4px 14px rgba(255, 102, 0, 0.3);
  }

  /* --- Result --- */
  .result-box {
    margin-top: 24px;
    background: linear-gradient(135deg, #e8f0ff, #f0f6ff);
    border: 2px solid #c0d4f8;
    border-radius: 16px;
    padding: 20px;
    display: none;
  }

  .result-box.show {
    display: block;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-box .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
  }

  .result-box .row:not(:last-child) {
    border-bottom: 1px dashed #b8cef8;
  }

  .result-box .label {
    font-size: 14px;
    color: #4a5f8a;
    font-weight: 500;
  }

  .result-box .value {
    font-size: 18px;
    font-weight: 700;
    color: #1a2a4a;
  }

  .result-box .value.highlight {
    color: #ff6600;
    font-size: 22px;
  }

  .result-box .sub {
    font-size: 12px;
    color: #7a90b4;
    font-weight: 400;
  }

  /* --- Error --- */
  .error-msg {
    background: #fff0f0;
    border: 1px solid #ffcccc;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    color: #d94040;
    margin-top: 10px;
    display: none;
  }

  .error-msg.show { display: block; }

  /* --- Footer --- */
  .footer {
    text-align: center;
    margin-top: 20px;
    font-size: 11px;
    color: #a0b8cc;
  }

  /* Responsive */
  @media (max-width: 420px) {
    .card { padding: 28px 20px; border-radius: 16px; }
    .input-group { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="brand-icon">🚚</div>
    <h1>集运运费估算器</h1>
    <p>启炎物流 · 东莞国际集运</p>
  </div>

  <!-- Destination -->
  <div class="section-label">目的地</div>
  <div class="destination-tabs">
    <button class="dest-tab active" data-country="US">🇺🇸 美国</button>
    <button class="dest-tab"        data-country="UK">🇬🇧 英国</button>
    <button class="dest-tab"        data-country="JP">🇯🇵 日本</button>
  </div>

  <!-- Package Info -->
  <div class="section-label">包裹信息</div>
  <div class="input-group">
    <div class="field">
      <label>实际重量 (kg)</label>
      <input type="number" id="weight" placeholder="如 2.5" min="0" step="0.1">
    </div>
    <div class="field">
      <label>长 (cm)</label>
      <input type="number" id="length" placeholder="如 30" min="0" step="0.1">
    </div>
    <div class="field">
      <label>宽 (cm)</label>
      <input type="number" id="width" placeholder="如 20" min="0" step="0.1">
    </div>
    <div class="field">
      <label>高 (cm)</label>
      <input type="number" id="height" placeholder="如 15" min="0" step="0.1">
    </div>
  </div>

  <div class="divider"></div>

  <!-- Calculate -->
  <button class="calc-btn" id="calcBtn">🔍 计算运费</button>
  <div class="error-msg" id="errorBox"></div>

  <!-- Result -->
  <div class="result-box" id="resultBox">
    <div class="row">
      <span class="label">📦 体积重</span>
      <span class="value" id="volWeight">—</span>
    </div>
    <div class="row">
      <span class="label">⚖️ 计费重量</span>
      <span class="value" id="billWeight">—</span>
    </div>
    <div class="row">
      <span class="label">💰 预估运费</span>
      <span class="value highlight" id="price">—</span>
    </div>
    <div class="row" style="border:none">
      <span class="label">📍 目的地</span>
      <span class="value" id="destLabel" style="font-size:14px">—</span>
    </div>
  </div>

  <div class="footer">以上为估算价，最终费用以实际出账为准</div>
</div>

<script>
  // Country config
  const PRICING = {
    US: { base: 80, add: 20, unit: 0.5, label: '美国', flag: '🇺🇸' },
    UK: { base: 90, add: 25, unit: 0.5, label: '英国', flag: '🇬🇧' },
    JP: { base: 60, add: 15, unit: 0.5, label: '日本', flag: '🇯🇵' },
  };

  let selectedCountry = 'US';

  // Tab switching
  document.querySelectorAll('.dest-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.dest-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      selectedCountry = tab.dataset.country;
      // Auto recalc if result is shown
      const res = document.getElementById('resultBox');
      if (res.classList.contains('show')) calc();
    });
  });

  // Calculate
  function calc() {
    const w   = parseFloat(document.getElementById('weight').value);
    const l   = parseFloat(document.getElementById('length').value);
    const wd  = parseFloat(document.getElementById('width').value);
    const h   = parseFloat(document.getElementById('height').value);
    const err = document.getElementById('errorBox');
    const res = document.getElementById('resultBox');

    err.classList.remove('show');
    err.textContent = '';

    // Validation
    if (isNaN(w) || w <= 0) { showErr('请输入正确的实际重量'); return; }
    if (isNaN(l) || l <= 0) { showErr('请输入正确的长度'); return; }
    if (isNaN(wd) || wd <= 0) { showErr('请输入正确的宽度'); return; }
    if (isNaN(h) || h <= 0) { showErr('请输入正确的高度'); return; }

    // Volumetric weight
    const volWeight = (l * wd * h) / 6000;
    const billWeight = Math.max(w, volWeight);

    // Pricing
    const cfg = PRICING[selectedCountry];
    const units = billWeight / cfg.unit;
    const price = cfg.base + Math.max(0, units - 1) * cfg.add;

    // Render
    document.getElementById('volWeight').textContent = volWeight.toFixed(2) + ' kg';
    document.getElementById('billWeight').textContent = billWeight.toFixed(2) + ' kg';
    document.getElementById('price').textContent = '¥' + price.toFixed(0) + ' 元';
    document.getElementById('destLabel').textContent = cfg.flag + ' ' + cfg.label;

    res.classList.add('show');
  }

  function showErr(msg) {
    const err = document.getElementById('errorBox');
    err.textContent = msg;
    err.classList.add('show');
    document.getElementById('resultBox').classList.remove('show');
  }

  document.getElementById('calcBtn').addEventListener('click', calc);

  // Enter key support
  document.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('keypress', e => {
      if (e.key === 'Enter') calc();
    });
  });
</script>

</body>
</html>
